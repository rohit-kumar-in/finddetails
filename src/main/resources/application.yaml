spring:
  application:
    name: mobilenumber
  datasource:
   # url: jdbc:postgresql://db.xcptoyhtuxectccfmgef.supabase.co:5432/postgres
    url: ${DB_URL}
    #username: postgres
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# Move logging outside of the 'spring' block
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE